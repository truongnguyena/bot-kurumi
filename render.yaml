# Render.com — Kurumi Bot 24/7 (Background Worker)
# Dashboard: New + Blueprint → chọn repo bot-kurumi
services:
  - type: worker
    name: kurumi-bot
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node scripts/prepare-deploy.js && npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: BOT_ADMIN_KEY
        sync: false
      - key: APPSTATE_JSON
        sync: false
      - key: GITHUB_ANIME_URL
        value: https://raw.githubusercontent.com/truongnguyena/bot-kurumi/main/data/anime.json
