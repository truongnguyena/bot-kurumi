# fly.toml app configuration file generated for bot-kurumi on 2026-05-25T18:16:44Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'bot-kurumi'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  GITHUB_ANIME_URL = 'https://raw.githubusercontent.com/truongnguyena/bot-kurumi/main/data/anime.json'
  GITHUB_APPSTATE_URL = 'https://raw.githubusercontent.com/truongnguyena/bot-kurumi/main/data/appstate.json'
  NODE_ENV = 'production'
  NODE_OPTIONS = '--disable-warning=DEP0040'

[processes]
  app = '/bin/sh /app/docker-entrypoint.sh'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '45s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
