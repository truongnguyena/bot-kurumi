# Kurumi Bot — Fly.io
# App name phai trung voi: fly apps list

app = 'bot-kurumi'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  NODE_ENV = 'production'
  NODE_OPTIONS = '--disable-warning=DEP0040'
  GITHUB_ANIME_URL = 'https://raw.githubusercontent.com/truongnguyena/bot-kurumi/main/data/anime.json'
  GITHUB_APPSTATE_URL = 'https://raw.githubusercontent.com/truongnguyena/bot-kurumi/main/data/appstate.json'

[processes]
  app = "/bin/sh /app/docker-entrypoint.sh"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = '45s'
    interval = '30s'
    method = 'GET'
    path = '/health'
    timeout = '10s'
